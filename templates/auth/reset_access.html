<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>
        Reset Vault Access
    </title>

    <link rel="stylesheet"
          href="{{ url_for(
          'static',
          filename='css/style.css'
    ) }}">

</head>

<body>

<div class="setup-container">

    <h1>

        Reset Access

    </h1>

    <p>

        Create new password and secret pattern

    </p>

    <form method="POST">

        <input
            type="password"
            name="vault_password"
            placeholder="New Vault Password"
            required
        >

        <h3>

            Select New 4 Secret Dates

        </h3>

        <div class="calendar-grid">

            {% for i in range(1,31) %}

            <div
                class="day-box"
                data-day="{{ i }}"
                onclick="toggleDate(this)"
            >

                {{ i }}

            </div>

            {% endfor %}

        </div>

        <p id="selectedText">

            Selected: None

        </p>

        <input
            type="hidden"
            name="calendar_pattern"
            id="calendarPattern"
        >

        <button>

            Save New Access

        </button>

    </form>

</div>

<script src="{{ url_for(

    'static',

    filename='js/setup.js'
) }}"></script>

</body>
</html>
