<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        CalVault Setup

    </title>

    <link rel="stylesheet"
          href="{{ url_for(
          'static',
          filename='css/style.css'
    ) }}">

</head>

<body>

<div class="setup-container">

    <h1>

        CalVault Setup

    </h1>

    <p>

        Initialize encrypted hidden storage

    </p>

    <form
        method="POST"
    >

        <input
            type="password"
            name="vault_password"
            placeholder="Enter Vault Password"
            required
        >

        <h3>

            Select Any 4 Secret Dates

        </h3>

        <div class="calendar-grid">

            {% for i in range(1,31) %}

                <div
                    class="day-box"
                    data-day="{{ i }}"
                    onclick="toggleDate(this)"
                >

                    {{ i }}

                </div>

            {% endfor %}

        </div>

        <p
            id="selectedText"
            class="selected-pattern"
        >

            Selected: None

        </p>

        <input
            type="hidden"
            name="calendar_pattern"
            id="calendarPattern"
        >

        <button
            type="submit"
        >

            Complete Setup

        </button>

    </form>

</div>

<script src="{{ url_for(

    'static',

    filename='js/setup.js'
) }}"></script>

</body>

</html>
